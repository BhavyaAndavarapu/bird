<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Webpage</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2a2f36;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        header {
            background: #1f2328;
            padding: 20px;
        }

        nav a {
            color: #4da3ff;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        section {
            padding: 30px;
        }

        .card {
            background: #3a4048;
            padding: 20px;
            margin: 20px auto;
            width: 250px;
            border-radius: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #4da3ff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #2d7dd2;
        }

        footer {
            background: #1f2328;
            padding: 10px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

<header>
    <h1>Welcome to My Random Page</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Projects</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section>
    <h2>About This Page</h2>
    <p>This is a simple HTML page created for testing and practice.</p>

    <div class="card">
        <h3>Fun Fact</h3>
        <p>The first website was created in 1991.</p>
        <button onclick="showMessage()">Click Me</button>
    </div>
</section>

<footer>
    <p>© 2026 My Random Website</p>
</footer>

<script>
function showMessage() {
    alert("Hello! Your HTML page is working perfectly 🚀");
}
</script>

</body>
</html>
